name: mae checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate-workflow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate workflow artifacts
        run: node scripts/validate-workflow.mjs

  commit-convention:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Check PR title is a Conventional Commit
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          node -e '
            const title = process.env.PR_TITLE || "";
            const re = /^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9-]+\))?!?: .+/;
            if (!re.test(title)) {
              console.error("PR title is not a valid Conventional Commit:\n  " + title);
              console.error("Expected e.g. \"feat(scope): add X\" — it becomes the squash-merge commit subject.");
              process.exit(1);
            }
            console.log("PR title OK: " + title);
          '
